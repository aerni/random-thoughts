title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: template
            field:
              type: template
              display: Template
          -
            handle: hero_image
            field:
              type: assets
              display: 'Hero Image'
              container: assets
              max_files: 1
          -
            handle: intro
            field:
              type: textarea
              display: 'Intro Text'
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - bold
                - italic
                - link
                - unorderedlist
                - orderedlist
          -
            handle: tags
            field:
              type: terms
              taxonomies:
                - tags
              display: Tags
              mode: select
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
