title: Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: intro
            field:
              type: textarea
              display: Intro
          -
            handle: image
            field:
              type: assets
              display: Bild
              container: assets
              max_files: 1
          -
            handle: video
            field:
              type: assets
              display: Video (optional, ersetzt das Bild)
              container: assets
              max_files: 1
              restrict: true
              allow_uploads: true
          -
            handle: content
            field:
              type: markdown
              display: Inhalt
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
