title: Post
tabs:
  main:
    display: Hauptbereich
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: taxonomie_begriffe_feld
            field:
              type: terms
              display: 'Taxonomie-Begriffe Feld'
              create: false
          -
            handle: intro
            field:
              type: textarea
              display: Intro
              instructions: 'Short introductory text shown in post header'
          -
            handle: featured_image
            field:
              type: assets
              display: 'Featured Image'
              container: assets
              max_files: 1
          -
            handle: content
            field:
              type: bard
              display: Content
          -
            handle: author
            field:
              max_items: 1
              type: users
              display: Autor
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
  neuer_tab:
    display: 'Neuer Tab'
    sections:
      -
        display: 'Neuer Abschnitt'
