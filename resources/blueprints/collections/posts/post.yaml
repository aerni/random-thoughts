title: Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Titel
              validate:
                - required
          -
            handle: author
            field:
              type: entries
              display: Autor
              collections:
                - authors
              max_items: 1
              mode: select
          -
            handle: spotify_link
            field:
              type: text
              display: Spotify-Link
          -
            handle: teaser_image
            field:
              type: assets
              display: Teaserbild
              container: assets
              max_files: 1
          -
            handle: teaser_video
            field:
              type: assets
              display: 'Teaser-Video (optional)'
              container: assets
              max_files: 1
              extensions:
                - mp4
                - webm
                - mov
          -
            handle: intro
            field:
              type: textarea
              display: Einleitung
              validate:
                - required
          -
            handle: content
            field:
              type: bard
              display: Inhalt
              toolbar:
                - bold
                - italic
                - underline
                - unorderedlist
                - orderedlist
                - heading
                - link
                - blockquote
          -
            handle: tags
            field:
              type: terms
              display: Tags
              taxonomies:
                - tags
              mode: select
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
