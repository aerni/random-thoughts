title: Artikel
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: text
            field:
              type: textarea
              display: Lead
          -
            handle: bild
            field:
              container: assets
              type: assets
              display: Bild
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true
          -
            handle: gallery
            field:
              type: grid
              display: Gallery
              fields:
                -
                  handle: path
                  field:
                    type: text
                    display: Path
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
