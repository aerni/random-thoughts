<!doctype html>
<html lang="{{ site:short_locale }}">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ title ?? site:name }}</title>
        {{ vite src="resources/js/site.js|resources/css/site.css" }}
        <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@900&family=Poppins:ital,wght@0,400;0,600;1,400;1,700&display=swap" rel="stylesheet">
    </head>

    <body class="flex flex-col justify-between min-h-screen font-sans leading-normal text-black bg-blush">

        <header>
            <nav>
                <div class="flex items-start justify-between px-6 py-6 font-sans text-base font-semibold md:text-xl md:px-16">
                    <a href="/">Lecker Schmecker</a>
                    <div class="flex items-center gap-4 md:gap-8">
                        <a href="/">Blog</a>
                        <a href="/about">About</a>
                        <a href="/favorites" class="relative" aria-label="Favorites">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                            <span id="nav-heart-badge" class="hidden absolute -top-1 -right-1 bg-hot-pink text-white text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center leading-none"></span>
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <img src="/assets/Buerger.png" alt="" class="flying-burger">
        <img src="/assets/Glace.png" alt="" class="flying-glace">
        <img src="/assets/Erdbeer.png" alt="" class="flying-erdbeer">

        {{ template_content }}

        <footer>
            <div class="flex items-start justify-center px-6 py-10 font-sans text-sm md:px-16">
                <p>&copy; {{ now format="Y" }} Lecker Schmecker</p>
            </div>
        </footer>

    </body>

</html>
