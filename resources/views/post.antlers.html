<article class="contents">

    <section>
        <div class="flex flex-col items-center max-w-4xl gap-6 px-6 mx-auto text-center md:gap-10 md:px-16">
            <h1 class="text-[#ff2f7f] text-5xl tracking-[0.04em] leading-none uppercase font-display md:text-8xl">
                {{ title }}
            </h1>
            <p class="font-sans text-xl leading-8 md:text-2xl md:leading-10">
                {{ lead }}
            </p>
            <p class="font-sans text-sm md:text-base">
                {{ date | format('l, d.m.y') }}
            </p>
        </div>
    </section>

    <section>
        <div class="flex flex-col gap-10 md:gap-14 lg:gap-20">

            <div class="px-6 mx-auto max-w-7xl md:px-16">
                <img src="{{ image }}" alt="" class="object-cover w-full aspect-2/1 rounded-xl bg-hot-pink">
            </div>

            <div class="max-w-4xl px-6 mx-auto md:px-16 prose prose-lg prose-headings:font-bold prose-a:text-[#ff2f7f]">
                <p class="font-sans text-xl leading-8 md:text-2xl md:leading-10">
                    {{ content }}
                </p>
            </div>

        </div>
    </section>

</article>

<!-- ===================== -->
<!-- RELATED ARTICLES -->
<!-- ===================== -->

<nav>
    <section class="px-6 md:px-16">

        <h1 class="text-2xl leading-none uppercase font-display md:text-6xl mb-10 text-center">
            Könnte dich auch interessieren:
        </h1>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">

            {{ collection:article limit="4" sort="random" :id:not="id" }}

            <a href="{{ url }}" class="block group h-full">

                <div class="h-full rounded-2xl shadow-md overflow-hidden bg-[#ffffff] flex flex-col transition group-hover:-translate-y-1 group-hover:shadow-xl">

                    <div class="overflow-hidden">
                        <img src="{{ image }}" alt="{{ title }}"
                            class="w-full aspect-w-4 aspect-h-3 object-cover transition duration-300 group-hover:scale-105">
                    </div>

                    <div class="p-4 flex flex-col flex-1">

                        <b class="text-[25px] font-display leading-[1.05] tracking-[0.05em] text-[#ff2f7f] min-h-16">
                            {{ title }}
                        </b>

                        <p class="text-xs leading-snug line-clamp-3 mt-2">
                            {{ prev_text }}
                        </p>

                        <div class="flex-1"></div>

                        <div class="mt-4">

                            <p class="text-[10px] text-gray-500 mb-3">
                                {{ date | format('l, d.m.y') }}
                            </p>

                            <span
                                class="inline-flex items-center justify-center w-full py-2 text-xs uppercase tracking-wider rounded-full bg-[#f794ba] text-white transition group-hover:bg-[#ff2f7f]">
                                Zum Artikel
                            </span>

                        </div>

                    </div>

                </div>

            </a>

            {{ /collection:article }}

        </div>

    </section>
</nav>

<!-- ===================== -->
<!-- CURSOR EFFECT -->
<!-- ===================== -->

<div id="cursor-container"></div>

<style>
    #cursor-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
    }

    .star {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #ff2f7f;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.8;
        animation: fade 0.8s linear forwards;
    }

    @keyframes fade {
        to {
            opacity: 0;
            transform: scale(0.3);
        }
    }
</style>

<script>
const container = document.getElementById('cursor-container');

// Cursor trail
document.addEventListener('mousemove', (e) => {
    createStar(e.clientX, e.clientY);
});

function createStar(x, y) {
    const star = document.createElement('div');
    star.classList.add('star');

    star.style.left = x + 'px';
    star.style.top = y + 'px';

    container.appendChild(star);

    setTimeout(() => star.remove(), 800);
}

// Click explosion
document.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
        createExplosion(e.clientX, e.clientY);
    }
});

function createExplosion(x, y) {
    const star = document.createElement('div');
    star.classList.add('star');

    const angle = Math.random() * Math.PI * 2;
    const distance = Math.random() * 80;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    star.style.left = x + 'px';
    star.style.top = y + 'px';

    container.appendChild(star);

    requestAnimationFrame(() => {
        star.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
        star.style.opacity = 0;
    });

    setTimeout(() => star.remove(), 800);
}
</script>
