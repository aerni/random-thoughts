{{ if tags }}
<div class="flex flex-wrap justify-center gap-2">
    {{ tags scope="tag" }}
    <a href="/tags?tag={{ tag:slug }}" class="font-sans text-xs px-3 py-1 rounded-full border border-orange-100/30 hover:border-orange-100/60 transition ease-out">{{ tag:title }}</a>
    {{ /tags }}
</div>
{{ /if }}
