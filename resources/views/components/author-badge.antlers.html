{{ author }}
    <div class="flex items-center gap-2 hover:opacity-70 transition">
        {{ if avatar }}
            <img src="{{ avatar }}" alt="{{ title }}" class="rounded-full object-cover shrink-0 {{ avatar_size ?? 'w-8 h-8' }}">
        {{ else }}
            <div class="flex items-center justify-center text-xs font-semibold text-white rounded-full bg-hot-pink shrink-0 {{ avatar_size ?? 'w-8 h-8' }}">{{ title | upper | substr:0:2 }}</div>
        {{ /if }}
        <span class="font-sans font-medium {{ text_size ?? 'text-xs' }}">{{ title }}</span>
    </div>
{{ /author }}
