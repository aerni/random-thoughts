<section>
    <div class="flex flex-col items-center max-w-4xl gap-6 px-6 mx-auto text-center md:gap-10 md:px-16">
        <h1 class="text-6xl leading-none uppercase font-display md:text-8xl">{{ title }}</h1>
        {{ if markdown }}
        <div class="article-content text-left">{{ markdown }}</div>
        {{ /if }}
    </div>
</section>

{{ image }}
<section>
    <div class="px-6 mx-auto max-w-7xl md:px-16">
        <img src="{{ url }}" alt="{{ title }}" class="w-1/2 h-auto rounded-xl mx-auto">
    </div>
</section>
{{ /image }}
