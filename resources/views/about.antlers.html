<header>
    <nav>
        <div class="flex items-start justify-between px-6 py-6 font-display italic font-medium text-base md:text-xl md:px-16">
            <p>Random Thoughts</p>
            <div class="flex items-center gap-4 md:gap-8">
                <a href="/">Blog</a>
                <a href="/tags">Tags</a>
                <a href="/about">About</a>
            </div>
        </div>
    </nav>
</header>

<main class="py-10 md:py-20">
    <section>
        <div class="flex flex-col gap-10 px-6 mx-auto max-w-8xl md:px-16 lg:gap-16">
            <h1 class="text-6xl leading-none tracking-tight font-bold font-display md:text-8xl text-center">About</h1>
            <div class="flex flex-col gap-10 md:flex-row md:gap-16 lg:gap-24">
                {{ if hero_image }}
                <div class="w-full md:w-1/3 shrink-0">
                    {{ hero_image }}
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover w-full rounded-xl aspect-square bg-hot-pink">
                    {{ /hero_image }}
                </div>
                {{ /if }}
                <div class="flex flex-col gap-6 md:w-2/3 md:gap-8">
                    {{ if intro }}<p class="font-sans text-xl leading-8 text-orange-100 md:text-2xl md:leading-10">{{ intro }}</p>{{ /if }}
                    {{ if content }}
                    <div class="font-sans prose prose-invert prose-p:text-orange-100 prose-p:font-light prose-headings:text-orange-100 prose-headings:font-semibold prose-h2:text-3xl prose-h2:mt-10 prose-h2:mb-4 md:prose-h2:text-4xl md:prose-h2:mt-14 md:prose-h2:mb-6 prose-p:text-base prose-p:leading-7 md:prose-p:text-lg md:prose-p:leading-8 prose-a:text-hot-pink hover:prose-a:underline">
                        {{ content }}
                    </div>
                    {{ /if }}
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="flex items-start justify-center px-6 py-10 font-sans text-sm md:px-16">
        <p>&copy; 2026 Random Thoughts</p>
    </div>
</footer>
