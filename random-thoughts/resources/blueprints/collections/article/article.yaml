title: Article
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
          -
            handle: lead
            field:
              type: textarea
              display: Lead
              localizable: true
          -
            handle: assets_field
            field:
              container: assets
              type: assets
              display: 'Assets Field'
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true
          -
            handle: video_field
            field:
              type: video
              display: 'Video Field'
          -
            handle: tags
            field:
              type: terms
              taxonomies:
                - tags
              display: Tags
              mode: select
      -
        display: 'Info Post'
        fields:
          -
            handle: icon_field
            field:
              type: icon
              display: 'Icon Field'
          -
            handle: date_field
            field:
              type: date
              display: 'Date Field'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
