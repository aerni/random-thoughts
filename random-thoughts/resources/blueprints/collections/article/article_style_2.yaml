title: 'Article Style 2'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: assets_field
            field:
              container: assets
              type: assets
              display: 'Assets Field'
          -
            handle: text_field
            field:
              type: text
              display: 'Text Field'
          -
            handle: textarea_field
            field:
              type: textarea
              display: 'Textarea Field'
          -
            handle: revealer_field
            field:
              type: revealer
              display: 'Revealer Field'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
          -
            handle: template
            field:
              type: template
              default: post_dark
              visibility: hidden
          -
            handle: layout
            field:
              type: text
              default: layout_dark_LOU
              visibility: hidden
