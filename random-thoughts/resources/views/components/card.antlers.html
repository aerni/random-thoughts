<article class="{{ class }} relative">
    <a href="{{ url }}" class="flex flex-col h-full overflow-hidden transition ease-out bg-white shadow-lg rounded-xl hover:-translate-y-1 hover:shadow-xl hover:text-blue-900">
        <img src="{{ image }}" alt="{{ image:alt }}" class="object-cover w-full h-72 bg-hot-pink">
        <div class="flex flex-col justify-between flex-1 gap-4 p-6 md:gap-5 md:p-8">
            <h2 class="font-sans text-xl font-semibold md:text-2xl">{{ title }}</h2>
            <p class="font-sans text-xs">{{ date }}</p>
        </div>
    </a>
    <button data-readlater data-url="{{ url }}" data-title="{{ title }}" class="absolute top-2 right-10 text-lg leading-none p-1.5 rounded-full bg-white/80 shadow hover:scale-110 transition-transform">🔖</button>
    <button data-like data-url="{{ url }}" class="absolute top-2 right-2 text-lg leading-none p-1.5 rounded-full bg-white/80 shadow hover:scale-110 transition-transform">🤍</button>
</article>
